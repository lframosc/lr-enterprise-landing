<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gracias - LR Enterprise</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .gracias-container {
            text-align: center;
            padding: 80px 20px;
        }
        .gracias-container h1 {
            font-size: 2.5rem;
            color: #2e7d32;
        }
        .gracias-container p {
            font-size: 1.2rem;
            margin-top: 10px;
        }
        .btn-volver {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 25px;
            background: #2e7d32;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
        }
        .btn-volver:hover {
            background: #1b5e20;
        }
    </style>
</head>

<body>

    <div class="gracias-container">
        <h1>¡Gracias por tu mensaje!</h1>
        <p>Tu información fue enviada correctamente.  
        Te responderé lo más pronto posible.</p>

        <a href="https://lr-enterprise-landing-2.onrender.com" class="btn-volver">
            Volver al inicio
        </a>
    </div>

</body>
</html>
